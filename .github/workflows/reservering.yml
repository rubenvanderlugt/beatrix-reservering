name: Reserveer Boot Automatisch

on:
  schedule:
    - cron: "30 19 * * *"
  workflow_dispatch: {}

jobs:
  reservering:
    runs-on: ubuntu-latest

    steps:
    - name: Repo ophalen
      uses: actions/checkout@v4

    - name: Python installeren
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Script uitvoeren
      run: python reserveer_st_antonisloop.py
