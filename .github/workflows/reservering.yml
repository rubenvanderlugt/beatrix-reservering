name: Reserveer Boot Automatisch

on:
  schedule:
    - cron: "0 23 * * 5"   # Vrijdag 23:00 UTC = Zaterdag 00:00 NL
  workflow_dispatch: {}     # handmatige start via telefoon

jobs:
  reservering:
    runs-on: ubuntu-latest

    steps:
    - name: Repo ophalen
      uses: actions/checkout@v4

    - name: Python installeren
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Playwright installeren
      run: |
        pip install playwright
        playwright install chromium

    - name: Start reserveringsscript
      env:
        BEATRIX_USER: ${{ secrets.BEATRIX_USER }}
        BEATRIX_PASS: ${{ secrets.BEATRIX_PASS }}
      run: python reserveer_st_antonisloop.py
