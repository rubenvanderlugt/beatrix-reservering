name: Reserveer Boot Dinsdag Automatisch

on:
  schedule:
    # START: elke maandag om 22:58 UTC
    # Dit geeft voldoende tijd om Playwright te installeren
    # Script wacht zelf tot NL 00:00:01 en reserveert dan voor dinsdag erop
    - cron: "21 13 * * 1"
  workflow_dispatch: {}  # handmatige test trigger

jobs:
  reservering:
    runs-on: ubuntu-latest

    steps:
    - name: Repo ophalen
      uses: actions/checkout@v4

    - name: Python installeren
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Playwright installeren
      run: |
        pip install playwright
        playwright install chromium

    - name: Start reserveringsscript (dinsdag-versie)
      env:
        BEATRIX_USER: ${{ secrets.BEATRIX_USER }}
        BEATRIX_PASS: ${{ secrets.BEATRIX_PASS }}
      run: python reserveer_st_antonisloop.py
