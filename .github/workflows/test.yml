name: TEST Full Run (Dummy Zondag)

on:
  workflow_dispatch:   # handmatig starten via telefoon

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Playwright
      run: |
        pip install playwright
        playwright install chromium

    - name: Run dummy full test (Sunday test)
      env:
        BEATRIX_USER: ${{ secrets.BEATRIX_USER }}
        BEATRIX_PASS: ${{ secrets.BEATRIX_PASS }}
      run: python reserveer_test_run.py
